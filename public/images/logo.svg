<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" fill="#C6A87C">
  <!-- Castle top - flag -->
  <rect x="95" y="0" width="4" height="30"/>
  <polygon points="99,5 99,18 115,11.5"/>
  
  <!-- Castle tower top -->
  <polygon points="80,30 120,30 115,45 85,45"/>
  
  <!-- Castle tower windows -->
  <rect x="70" y="45" width="60" height="50" rx="2"/>
  <rect x="82" y="50" width="8" height="15" rx="4" fill="#120F0D"/>
  <rect x="96" y="50" width="8" height="15" rx="4" fill="#120F0D"/>
  <rect x="110" y="50" width="8" height="15" rx="4" fill="#120F0D"/>
  
  <!-- Castle body -->
  <rect x="60" y="95" width="80" height="45" rx="2"/>
  <rect x="68" y="100" width="10" height="18" rx="5" fill="#120F0D"/>
  <rect x="83" y="100" width="10" height="18" rx="5" fill="#120F0D"/>
  <rect x="98" y="100" width="10" height="18" rx="5" fill="#120F0D"/>
  <rect x="113" y="100" width="10" height="18" rx="5" fill="#120F0D"/>
  
  <!-- Castle battlements -->
  <rect x="55" y="88" width="15" height="12"/>
  <rect x="75" y="88" width="15" height="12"/>
  <rect x="95" y="88" width="15" height="12"/>
  <rect x="115" y="88" width="15" height="12"/>
  <rect x="135" y="88" width="12" height="12"/>
  
  <!-- Coffee bean - right side -->
  <ellipse cx="120" cy="185" rx="55" ry="70" transform="rotate(15, 120, 185)"/>
  
  <!-- Coffee bean crease -->
  <path d="M 95 130 Q 105 185 115 240" stroke="#120F0D" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- Overlap: castle sits on top of bean -->
  <rect x="60" y="130" width="55" height="15" fill="#C6A87C"/>
</svg>
